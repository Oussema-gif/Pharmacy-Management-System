services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmacy-postgres
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pharmacy-backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pharmacy_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: yourpassword
      APP_JWT_SECRET: mySecretKeyForJWTWhichShouldBeLongAndSecure
      APP_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: pharmacy-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata: