<div class="page-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Reports (Branch #{{ branchId }})</h2>
    <button class="btn btn-outline-success" (click)="exportSales()">
      <i class="fas fa-download me-2"></i> Export Sales CSV
    </button>
  </div>

  <!-- Skeleton -->
  <div *ngIf="loading" class="row g-4">
    <div class="col-md-4" *ngFor="let _ of [1,2,3]">
      <div class="card stat-card skeleton-card">
        <div class="card-body">
          <div class="skeleton skeleton-heading"></div>
          <div class="skeleton skeleton-text"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div *ngIf="error && !loading" class="alert alert-danger">{{ error }}</div>

  <!-- Data -->
  <div *ngIf="summary && !loading" class="row g-4">
    <div class="col-md-4">
      <div class="card stat-card">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted small mb-1">Total Sales</p>
            <h3 class="fw-bold">{{ summary.totalSales }}</h3>
          </div>
          <div class="stat-icon" style="background: linear-gradient(135deg, #6366f1, #818cf8);">
            <i class="fas fa-shopping-cart text-white"></i>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card stat-card">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted small mb-1">Total Revenue</p>
            <h3 class="fw-bold">{{ summary.totalRevenue | currency }}</h3>
          </div>
          <div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #34d399);">
            <i class="fas fa-dollar-sign text-white"></i>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card stat-card">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted small mb-1">Average Sale</p>
            <h3 class="fw-bold">{{ summary.averageSale | currency }}</h3>
          </div>
          <div class="stat-icon" style="background: linear-gradient(135deg, #0ea5e9, #38bdf8);">
            <i class="fas fa-chart-line text-white"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
