<div class="page-container">
  <h2 class="fw-bold mb-4">{{ isEdit ? 'Edit User' : 'Add New User' }}</h2>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div class="card">
    <div class="card-body">
      <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Full Name *</label>
            <input type="text" class="form-control" formControlName="fullName" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" formControlName="email" />
          </div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Password <small class="text-muted" *ngIf="isEdit">(leave blank to keep)</small></label>
            <input type="password" class="form-control" formControlName="password" />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Role *</label>
            <select class="form-select" formControlName="role">
              <option value="">-- Select --</option>
              <option value="ADMIN">Administrator</option>
              <option value="MANAGER">Manager</option>
              <option value="PHARMACIST">Pharmacist</option>
              <option value="CASHIER">Cashier</option>
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Branch</label>
            <select class="form-select" formControlName="branchId">
              <option [ngValue]="null">-- None --</option>
              <option *ngFor="let b of branches" [ngValue]="b.id">{{ b.name }}</option>
            </select>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success" [disabled]="userForm.invalid">Save</button>
          <button type="button" class="btn btn-outline-secondary" [routerLink]="['/users']">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
