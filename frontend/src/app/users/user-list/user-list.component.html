<div class="page-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">User Management</h2>
    <button class="btn btn-primary" [routerLink]="['/users/new']">
      <i class="fas fa-plus me-2"></i> Add New User
    </button>
  </div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table mb-0" *ngIf="users.length > 0">
          <thead>
            <tr><th>ID</th><th>Full Name</th><th>Email</th><th>Role</th><th>Branch</th><th class="text-end">Actions</th></tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of users">
              <td>{{ user.id }}</td>
              <td>{{ user.fullName }}</td>
              <td>{{ user.email }}</td>
              <td><span class="badge bg-light text-dark">{{ user.role }}</span></td>
              <td>{{ user.branchName || '-' }}</td>
              <td class="text-end">
                <div class="action-buttons">
                  <button class="btn-action btn-edit" [routerLink]="['/users/edit', user.id]" title="Edit">
                    <i class="fas fa-pen"></i>
                  </button>
                  <button class="btn-action btn-delete" (click)="deleteUser(user.id!)" title="Delete">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <p *ngIf="users.length === 0 && !error" class="text-muted p-3">No users found.</p>
    </div>
  </div>
</div>
