<div class="page-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Supplier Management</h2>
    <button class="btn btn-primary" [routerLink]="['/suppliers/new']">
      <i class="fas fa-plus me-2"></i> Add New Supplier
    </button>
  </div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table mb-0" *ngIf="suppliers.length > 0">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Contact</th><th>Phone</th><th>Email</th><th class="text-end">Actions</th></tr>
          </thead>
          <tbody>
            <tr *ngFor="let s of suppliers">
              <td>{{ s.id }}</td>
              <td>{{ s.name }}</td>
              <td>{{ s.contactPerson || '-' }}</td>
              <td>{{ s.phone || '-' }}</td>
              <td>{{ s.email || '-' }}</td>
              <td class="text-end">
                <div class="action-buttons">
                  <button class="btn-action btn-edit" [routerLink]="['/suppliers/edit', s.id]" title="Edit">
                    <i class="fas fa-pen"></i>
                  </button>
                  <button class="btn-action btn-delete" (click)="deleteSupplier(s.id!)" title="Delete">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <p *ngIf="suppliers.length === 0 && !error" class="text-muted p-3">No suppliers found.</p>
    </div>
  </div>
</div>
