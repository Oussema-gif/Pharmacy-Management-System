<div class="page-container">
  <h2 class="fw-bold mb-4">{{ isEdit ? 'Edit Supplier' : 'Add New Supplier' }}</h2>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div class="card">
    <div class="card-body">
      <form [formGroup]="supplierForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Name *</label>
            <input type="text" class="form-control" formControlName="name" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Contact Person</label>
            <input type="text" class="form-control" formControlName="contactPerson" />
          </div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" formControlName="phone" />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email" />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" formControlName="address" />
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success" [disabled]="supplierForm.invalid">Save</button>
          <button type="button" class="btn btn-outline-secondary" [routerLink]="['/suppliers']">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
