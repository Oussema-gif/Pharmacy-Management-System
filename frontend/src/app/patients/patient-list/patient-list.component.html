<div class="container">
  <h2>Patients</h2>

  <div class="mb-3 d-flex gap-2">
    <button class="btn btn-primary" [routerLink]="['/patients/new']">
      <i class="fas fa-plus me-2"></i> Add New Patient
    </button>

    <button class="btn btn-outline-success" (click)="exportPatients()" [disabled]="patients.length === 0">
      <i class="fas fa-download me-2"></i> Export CSV
    </button>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table mb-0" *ngIf="patients.length > 0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Full Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Address</th>
              <th>Branch</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let p of patients">
              <td>{{ p.id }}</td>
              <td>{{ p.fullName }}</td>
              <td>{{ p.phone || '-' }}</td>
              <td>{{ p.email || '-' }}</td>
              <td>{{ p.address || '-' }}</td>
              <td>{{ p.branchName || '-' }}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-warning me-1" [routerLink]="['/patients/edit', p.id]">
                  Edit
                </button>
                <button class="btn btn-sm btn-danger" (click)="deletePatient(p.id!)">
                  Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <p *ngIf="patients.length === 0 && !error" class="text-muted p-3">
        No patients registered.
      </p>
    </div>
  </div>
</div>
