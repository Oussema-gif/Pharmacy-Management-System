<div class="page-container">
  <h2 class="fw-bold mb-4">{{ isEdit ? 'Edit Patient' : 'Add New Patient' }}</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="card">
    <div class="card-body">
      <form [formGroup]="patientForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Full Name *</label>
            <input type="text" class="form-control" formControlName="fullName" />
            <div
              class="text-danger mt-1"
              *ngIf="patientForm.get('fullName')?.touched && patientForm.get('fullName')?.invalid"
            >
              Full name is required.
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" formControlName="phone" />
          </div>
        </div>

        <div class="row" *ngIf="isAdmin">
          <div class="col-md-6 mb-3">
            <label class="form-label">Branch *</label>
            <select class="form-select" formControlName="branchId">
              <option [ngValue]="null">-- Select Branch --</option>
              <option *ngFor="let branch of branches" [ngValue]="branch.id">
                {{ branch.name }}
              </option>
            </select>
            <div
              class="text-danger mt-1"
              *ngIf="patientForm.get('branchId')?.touched && patientForm.get('branchId')?.invalid"
            >
              Branch is required for admin users.
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email" />
        </div>

        <div class="mb-3">
          <label class="form-label">Address</label>
          <textarea class="form-control" formControlName="address" rows="2"></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success" [disabled]="patientForm.invalid">
            Save
          </button>
          <button type="button" class="btn btn-outline-secondary" [routerLink]="['/patients']">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
