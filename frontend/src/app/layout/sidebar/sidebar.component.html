<nav class="sidebar" aria-label="Primary navigation">
  <div class="sidebar-brand">
    <div class="brand-icon" aria-hidden="true">
      <i class="fas fa-clinic-medical"></i>
    </div>

    <div class="brand-text">
      <h5>MediCare</h5>
      <span>Pharmacy System</span>
    </div>
  </div>

  <ul class="sidebar-menu">
    <li *ngFor="let item of menuItems" class="menu-item">
      <a
        [routerLink]="[item.link]"
        routerLinkActive="active"
        ariaCurrentWhenActive="page"
        class="menu-link"
      >
        <i [class]="item.icon" aria-hidden="true"></i>
        <span>{{ item.title }}</span>
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <button
      type="button"
      class="menu-link theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      [attr.title]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <i
        [class]="isDarkMode() ? 'fas fa-sun' : 'fas fa-moon'"
        aria-hidden="true"
      ></i>
      <span>{{ isDarkMode() ? 'Light mode' : 'Dark mode' }}</span>
    </button>

    <button type="button" class="menu-link logout-link" (click)="logout()">
      <i class="fas fa-right-from-bracket" aria-hidden="true"></i>
      <span>Logout</span>
    </button>
  </div>
</nav>
